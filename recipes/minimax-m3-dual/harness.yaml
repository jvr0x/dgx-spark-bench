# Harness run config for the minimax-m3-dual recipe (2x DGX Spark, TP=2).
# Runs ON the master Spark, against the as-served profile on :8888.
#
#   lmswitch on minimax-m3-dual   # wait for Ready on port 8888 (both nodes)
#   cd ~/dev/dgx-spark-bench/harness
#   .venv/bin/python bench.py ../recipes/minimax-m3-dual/harness.yaml \
#     -o ../results/minimax-m3-dual.json
#   lmswitch off minimax-m3-dual
#
# As-served (not a raised bench-profile): max_num_seqs=1 is the model's own
# KV-capacity ceiling on this pair (105.8 GiB/node just for weights at
# ctx=196608 — see the lmswitch yaml's own boot-log notes), so the sweep is
# a single N=1 point: the roofline anchor, not a scaling curve.

series:
  id: minimax-m3-dual
  model: MiniMax-M3 428B [DUAL 2xSpark]
  quant: W4A16 GPTQ + NVFP4-KV (b12x) + EAGLE3
  backend: vLLM (vllm-dual, TP=2)
  status: measured
  weights_gb: 208.5
  recipe_url: https://github.com/jvr0x/dgx-spark-bench/tree/main/recipes/minimax-m3-dual
  config:
    checkpoint: Sebesky/MiniMax-M3-W4A16-GPTQ
    topology: TP=2 across spark (master) + gigabyte (worker) over CX7 RoCE
    image: vllm-node-minimax-m3-b12x-lmswitch
    attention_backend: b12x
    kv_cache_dtype: nvfp4
    speculative: EAGLE3, draft_tensor_parallel_size=2, 3 tokens
    gpu_memory_utilization: 0.929
    max_num_seqs: 1
    max_model_len: 196608
    block_size: 128
    max_num_batched_tokens: 1024
    thinking_mode: adaptive
    note: "428B, no pruning; max_num_seqs=1 is a genuine KV-capacity ceiling (weights alone are 105.8 GiB/node) — single-point roofline anchor, not a scaling curve"

hardware:
  name: DGX Spark x2 (dual, TP=2)
  soc: GB10 Grace Blackwell (x2, CX7 RoCE interconnect)
  mem_gb: 256
  mem_type: LPDDR5x
  bw_gbs: 546
  fp4_tops: 2000

workload:
  name: chat
  prompt_tokens: 1024
  output_tokens: 256

sweep:
  # max_num_seqs is 1 on this pair — no concurrency scaling is possible.
  concurrencies: [1]
  warmup_s: 30
  measure_s: 180
  request_timeout_s: 300

engine:
  base_url: http://localhost:8888        # harness runs on the master Spark -> localhost
  model: minimax-m3-dual                 # MUST equal the dual yaml's served-model-name
  api_key: dummy
  extra_body:
    ignore_eos: true
    min_tokens: 256
