# MiniMax-M3 (428B, no pruning) — W4A16 GPTQ + b12x NVFP4 KV + EAGLE3 —
# TP=2 across spark + gigabyte over CX7.
# From a3refaat/spark-vllm-docker branch minimax-m3-4bit-w4a16 (lane A —
# recipes/minimax-m3-w4a16-gptq-b12x-nvfp4-eagle3.yaml), via
# tonyd2wild/MiniMax-M3-2x-DGX-Spark-36-tok-s. Image built locally
# (vllm-node-minimax-m3-b12x, via ~/utils/minimax-m3-spark-vllm-docker
# /build-deploy.sh — prebuilt wheels covered our arch, ~2.5 min not the
# feared 1-2h source compile) and copied to gigabyte. Weights live ONCE on
# gigabyte (target ~209G + EAGLE3 drafter ~1.6G); spark reads both over the
# CX7 NFS mount, same convention as the other dual recipes.
#
# gpu_memory_utilization is intentionally NOT the upstream-bracketed 0.929 —
# that value was hand-bracketed to a3refaat's own pair's exact boot-time free
# memory (0.93 failed by 0.02 GiB, 0.925 boots but undersizes the KV pool).
# Their own doc warns overcommit on GB10 unified memory "can wedge a node
# hard enough to need a power cycle" — that bracketing needs to be redone
# live, on our pair, with someone watching. Started here at a conservative
# 0.85 (same value that's worked cleanly for deepseek-v4-flash-dspark-dual
# and step-3.7-flash-dual on this exact hardware) with max_model_len pulled
# down from the lane's 196608 to 65536 to keep first-boot KV-cache pressure
# low. Bump both upward — carefully, watching `docker logs` — once verified.
runtime: vllm-dual
# -lmswitch tag = base vllm-node-minimax-m3-b12x + a3refaat's 9 launch-time
# mods baked in via a derived Dockerfile (~/utils/minimax-m3-spark-vllm-docker
# /Dockerfile.lmswitch-mods), instead of applied via docker-cp+exec at every
# launch like his own run-recipe.sh does. Without these, AttentionBackendEnum
# has no "B12X" member and --attention-backend=b12x fails at engine-config time.
image: "vllm-node-minimax-m3-b12x-lmswitch"
# Image's own ENTRYPOINT is the generic /opt/nvidia/nvidia_entrypoint.sh
# wrapper (confirmed via docker inspect), not `vllm serve` — without this,
# lmswitch's plain arg-appending CMD tries to exec the model *path* as the
# program (`exec: /model: cannot execute: Is a directory`).
entrypoint: "vllm serve"
model: "Sebesky/MiniMax-M3-W4A16-GPTQ"
model_path: "~/models-gigabyte/Sebesky/MiniMax-M3-W4A16-GPTQ"
worker_model_path: "~/models/Sebesky/MiniMax-M3-W4A16-GPTQ"
port: 8888
display_name: "MiniMax-M3 W4A16+EAGLE3 [DUAL 2x SPARK]"

worker_host: Gigabyte
master_addr: 10.100.224.2
worker_ip: 10.100.224.1
master_port: 25000
nccl:
  ifname: enp1s0f1np1
  hca: rocep1s0f1
  gid_index: 3

# 2026-07-21: bumped to upstream's own lane-A ctx (196608) now that
# gpu_memory_utilization is proven at their exact bracketed value below —
# was 65536 (~1/3) only as a first-boot safety margin.
ctx: 196608
max_num_seqs: 1
# 2026-07-20: 0.85 failed cleanly ("No available memory for the cache
# blocks") — weights alone take 105.8 GiB/node per the boot log. 0.90 got
# very close (short by only 0.19 GiB: needed 1.59 GiB KV, had 1.4 GiB) —
# both clean pre-flight refusals, never a live overcommit. Converged on
# upstream's own bracketed value (0.929), matching their lane-A recipe
# exactly (verified live at ctx=65536 2026-07-20; ctx bumped to their full
# 196608 2026-07-21 — re-verify below).
gpu_memory_utilization: 0.929
enforce_eager: false
shm_size: 64g
ready_timeout: 2400

# EAGLE3 drafter (draft_tensor_parallel_size=2, so both nodes need it) —
# mounted separately from the main /model bind since it's a second,
# independent checkpoint. head/worker_extra_mounts cover the asymmetry:
# spark reads it over the NFS alias, gigabyte reads its own local copy
# directly (do NOT also list this under `extra_mounts` — that applies to
# both sides identically and would double-mount /drafter on the worker).
head_extra_mounts:
  - "~/models-gigabyte/Sebesky/MiniMax-M3-EAGLE3-RTN-INT4:/drafter:ro"
worker_extra_mounts:
  - "~/models/Sebesky/MiniMax-M3-EAGLE3-RTN-INT4:/drafter:ro"

env:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  OMP_NUM_THREADS: "20"
  MKL_NUM_THREADS: "20"
  OPENBLAS_NUM_THREADS: "20"
  NUMEXPR_NUM_THREADS: "20"
  VLLM_USE_BREAKABLE_CUDAGRAPH: "0"
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
  VLLM_M3_FP8_KV_TEST_SCALE: "1.0"

extra_args:
  - "--trust-remote-code"
  - "--block-size=128"
  - "--max-num-batched-tokens=1024"
  - "--kv-cache-dtype=nvfp4"
  - "--attention-backend=b12x"
  - "--attention-config={\"indexer_kv_dtype\":\"nvfp4\"}"
  - "--compilation-config={\"mode\":0,\"cudagraph_mode\":\"FULL_DECODE_ONLY\",\"cudagraph_copy_inputs\":true}"
  - "--speculative-config={\"method\":\"eagle3\",\"model\":\"/drafter\",\"draft_tensor_parallel_size\":2,\"num_speculative_tokens\":3,\"attention_backend\":\"b12x\"}"
  - "--default-chat-template-kwargs={\"thinking_mode\":\"adaptive\"}"
  - "--load-format=safetensors"
  - "--language-model-only"
  - "--reasoning-parser=minimax_m3"
  - "--enable-auto-tool-choice"
  - "--tool-call-parser=minimax_m3"
