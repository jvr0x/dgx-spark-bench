# lmswitch BENCH PROFILE of Nemotron-3-Super-120B-A12B NVFP4 via vLLM (stock image).
# Hybrid Mamba-2 + LatentMoE + attention + MTP — 120B total / 12B active params.
# ~75G weights: solo only — stop the always-on llama-servers first.
# Mixed-precision modelopt checkpoint (NVFP4 + FP8 layers) — flashinfer_cutlass MoE required.
#
# Filename id = served-model-name = "nemotron-3-super-nvfp4-vllm".
runtime: vllm
model: "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
port: 8244
ctx: 32768
display_name: "Nemotron-3-Super-120B NVFP4 [BENCH]"
# 0.3 + explicit --kv-cache-memory-bytes below. REQUIRED for MTP on this AEON-family
# image: the CUDA-graph memory estimator returns a negative free-memory figure for
# MTP checkpoints, inflating the KV budget past physical RAM -> full box reboot
# (confirmed on the sibling nemotron-labs-3-puzzle-75b recipe, 2026-07-19; same
# root cause documented in PLANNING.md for the qwen3.6-35b flagship). This model's
# ~75GB weights leave less headroom than puzzle-75B's ~50GB, hence the extra margin.
gpu_memory_utilization: 0.3
max_num_seqs: 64
load_format: "auto"
enforce_eager: false
tool_call_parser: "qwen3_coder"
reasoning_parser: "super_v3"
reasoning_parser_plugin: "/app/super_v3_reasoning_parser.py"
trust_remote_code: true
ready_timeout: 900

extra_mounts:
  - "~/models/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4/super_v3_reasoning_parser.py:/app/super_v3_reasoning_parser.py:ro"

env:
  TORCH_CUDA_ARCH_LIST: "12.1a"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  NVIDIA_TF32_OVERRIDE: "1"
  TORCH_ALLOW_TF32_CUBLAS_OVERRIDE: "1"
  VLLM_NVFP4_GEMM_BACKEND: "marlin"
  # Caps parallel Inductor/Triton compile workers during warmup — without this,
  # this image's Mamba2 kernel compile spawns ~10 parallel cicc/ptxas processes
  # (~8GB each), a transient spike that OOM'd the sibling puzzle-75B recipe.
  TORCHINDUCTOR_COMPILE_THREADS: "2"

extra_args:
  - "--mamba-backend"
  - "flashinfer"
  - "--async-scheduling"
  - "--attention-backend"
  - "flashinfer"
  - "--speculative-config"
  - '{"method":"mtp","num_speculative_tokens":3}'
  - "--enable-auto-tool-choice"
  - "--enable-prefix-caching"
  - "--max-num-batched-tokens"
  - "16384"
  - "--max-model-len"
  - "32768"
  - "--moe-backend"
  - "flashinfer_cutlass"
  - "--enable-chunked-prefill"
  - "--kv-cache-dtype"
  - "fp8"
  - "--kv-cache-memory-bytes"
  - "17179869184"                  # 16 GiB explicit cap — bypasses broken AEON MTP estimator
  - "--mamba_ssm_cache_dtype"
  - "float16"