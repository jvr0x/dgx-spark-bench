# Harness run config for the qwen3.6-27b-nvfp4-nvidia recipe.
# Runs ON the Spark, against the bench-profile served by lmswitch on :8217.
#
#   lmswitch on qwen3.6-27b-nvfp4-nvidia       # wait for "Ready on port 8217"
#   cd ~/dev/dgx-spark-bench/harness
#   .venv/bin/python bench.py ../recipes/qwen3.6-27b-nvfp4-nvidia/harness.yaml \
#     -o ../results/qwen3.6-27b-nvfp4-nvidia-27b.json
#   lmswitch off qwen3.6-27b-nvfp4-nvidia

series:
  id: qwen3.6-27b-nvfp4-nvidia
  model: Qwen3.6-27B-NVFP4
  params_b: 27
  quant: NVFP4-mixed (dense hybrid)
  backend: vLLM 0.23 (AEON)
  status: measured
  weights_gb: 20.4
  recipe_url: https://github.com/jvr0x/dgx-spark-bench/tree/main/recipes/qwen3.6-27b-nvfp4-nvidia
  config:
    checkpoint: nvidia/Qwen3.6-27B-NVFP4
    image: ghcr.io/aeon-7/aeon-vllm-ultimate:2026-07-16-v0.25.1
    quantization: modelopt_mixed (auto)
    attention_backend: flashinfer
    kv_cache_dtype: fp8
    kv_cache_memory: 64 GiB (explicit)
    speculative: NONE (no MTP)
    max_num_seqs: 64
    max_model_len: 32768
    max_num_batched_tokens: 8192
    cuda_graphs: true
    chunked_prefill: true
    async_scheduling: false
    prefix_caching: "on (defeated by unique prompts)"
    load_format: fastsafetensors
    vision_tower: "disabled (limit_mm_per_prompt: {image:0, video:0})"

engine:
  base_url: http://localhost:8217
  model: qwen3.6-27b-nvfp4-nvidia
  api_key: dummy
  extra_body:
    ignore_eos: true
    min_tokens: 256

hardware:
  name: DGX Spark
  soc: GB10 Grace Blackwell
  mem_gb: 128
  mem_type: LPDDR5x
  bw_gbs: 273
  fp4_tops: 1000

workload:
  name: chat
  prompt_tokens: 1024
  output_tokens: 256

sweep:
  concurrencies: [1, 2, 4, 8, 16, 32]
  warmup_s: 30
  measure_s: 180
  request_timeout_s: 300
