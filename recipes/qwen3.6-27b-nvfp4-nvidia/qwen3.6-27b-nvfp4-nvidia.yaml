# lmswitch BENCH PROFILE of qwen3.6-27b-nvfp4-nvidia — NVFP4 dense hybrid, text-only.
#
# IDENTICAL to daily-driver config except:
#   max_num_seqs:            16  -> 64      don't cap concurrency below sweep ceiling
#   gpu_memory_utilization:  0.85 -> 0.5    bounds non-KV allocations; KV comes from byte cap
#   ctx:                  262144 -> 32768  256K pre-reserves huge KV; workload needs ~1.3K
#   max-num-batched-tokens:  32768 -> 8192  consistent with 35B bench
#
# This is a VLM checkpoint (vision tower present, disabled via limit_mm_per_prompt).
# No MTP spec-decode — this model doesn't have it. It's a "hardware truth" run.
#
# Filename id = served-model-name = "qwen3.6-27b-nvfp4-nvidia".
# Place in your lmswitch ai-models/, then:
#   lmswitch on qwen3.6-27b-nvfp4-nvidia

runtime: vllm
model: "nvidia/Qwen3.6-27B-NVFP4"
port: 8217
ctx: 32768
display_name: "Qwen3.6-27B NVFP4 (NVIDIA) [BENCH]"

image: "ghcr.io/aeon-7/aeon-vllm-ultimate:latest"
entrypoint: "vllm serve"
env:
  TORCH_CUDA_ARCH_LIST: "12.1a"
  CUTE_DSL_ARCH: "sm_121a"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

gpu_memory_utilization: 0.3
max_num_seqs: 64
load_format: "fastsafetensors"
trust_remote_code: true
enforce_eager: false
tool_call_parser: "qwen3_xml"
reasoning_parser: "qwen3"
attention_backend: "flashinfer"
limit_mm_per_prompt: '{"image":0,"video":0}'

extra_args:
  - "--kv-cache-memory-bytes"
  - "68719476736"                  # 64 GiB — explicit KV cap (bypasses broken AEON estimator; increased from 32GiB for N=32)
  - "--kv-cache-dtype"
  - "fp8"
  - "--max-num-batched-tokens"
  - "8192"
  - "--enable-chunked-prefill"
  - "--enable-prefix-caching"
