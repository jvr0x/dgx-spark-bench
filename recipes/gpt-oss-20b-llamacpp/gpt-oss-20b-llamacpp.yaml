# lmswitch BENCH PROFILE of gpt-oss-20b — GGUF via llama.cpp
#
# Benchmark profile for the openai/gpt-oss-20b-GGUF checkpoint (Q4_K_XL, ~11.1G).
# Served via llama.cpp (runtime: llama). No speculative decoding available in llama.cpp,
# so this is a "hardware truth" run by default.
#
# Filename id = served-model-name = "gpt-oss-20b-llamacpp".
# Place in your lmswitch ai-models/, then:
#   lmswitch on gpt-oss-20b-llamacpp

runtime: llama
model: "openai/gpt-oss-20b-GGUF/gpt-oss-20b-UD-Q4_K_XL.gguf"
port: 8216
# With -kvu the ctx is one shared pool: 32 streams x 1280 tok = ~41K cells < 65536.
ctx: 65536
display_name: "GPT-OSS-20B GGUF [BENCH]"

# -np 32: slots >= sweep ceiling (32) — don't cap concurrency below the sweep.
# -kvu: unified KV buffer; explicit -np disables it, and split mode measured
# ~30% slower per-stream (see qwen3.6-35b-q8-llamacpp results/*-np32-split.json).
extra_args: ["-fa", "on", "-ctk", "q8_0", "-ctv", "q8_0", "-np", "32", "-kvu"]
