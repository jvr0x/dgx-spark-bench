# DeepSeek V4 Flash DSpark — TP=2 across spark + gigabyte over CX7 (1M ctx).
# Translated from MiaAI-Lab/DeepSeek-v4-Flash-DSpark-2x-DGX-Spark. 2026-07-16:
# switched to Anemll's prebuilt vLLM 0.25 image (ghcr.io/anemll/dspark-vllm-gx10)
# — DSpark/NVFP4-DS-MLA/b12x-MoE now ship IN the image, replacing the local
# Stage-C build + Keys proposer bind-mount. Validated upstream at 66.6 tok/s
# single-stream, 153.7 tok/s aggregate @ 6 concurrent (at their util=0.85).
# 2026-07-20: was pinned to util=0.75, which crashed AFTER weight load during
# KV-cache allocation at the full 1M ctx (needed 7.54 GiB, had 7.31 GiB —
# ~3% short; ValueError from vllm/v1/core/kv_cache_utils.py). Both nodes sit
# idle at ~117G available with nothing else competing, so there was no real
# headroom reason for 0.75 — reverted to the upstream-validated 0.85. Weights
# live ONCE in
# ~/models/deepseek-ai/DeepSeek-V4-Flash-DSpark on gigabyte; spark reads them
# over the NFS mount at the same path. Image must be `docker pull`ed on BOTH
# nodes (no local build needed).
runtime: vllm-dual
image: "ghcr.io/anemll/dspark-vllm-gx10:0.1.1"
model: "deepseek-ai/DeepSeek-V4-Flash-DSpark"
# Weights live once, on gigabyte, per the ~/models/<hf-user>/<model>
# convention; spark reads the same directory over the NFS mount.
model_path: "~/models-gigabyte/deepseek-ai/DeepSeek-V4-Flash-DSpark"
worker_model_path: "~/models/deepseek-ai/DeepSeek-V4-Flash-DSpark"
port: 8888
display_name: "DeepSeek-V4-Flash DSpark 1M [DUAL 2x SPARK]"

worker_host: Gigabyte
master_addr: 10.100.224.2
worker_ip: 10.100.224.1
master_port: 25000
nccl:
  ifname: enp1s0f1np1
  hca: rocep1s0f1
  gid_index: 3

ctx: 1048576
max_num_seqs: 12
gpu_memory_utilization: 0.85
# The recipe profile relies on cudagraph capture (--max-cudagraph-capture-size
# below); lmswitch's single-node default of --enforce-eager must stay off.
enforce_eager: false
shm_size: 64g
ready_timeout: 2400

extra_mounts:
  # Node-local vLLM compile cache — must NOT live in the shared NFS cache or
  # the two nodes trample each other's torch.compile artifacts.
  - "~/.cache/vllm-dspark:/root/.cache/vllm"

# No entrypoint override: the Anemll image's native ENTRYPOINT is already
# ["vllm", "serve"] (confirmed via docker inspect) — unlike the old Stage-C
# image (ENTRYPOINT /bin/bash), so lmswitch's plain arg-appending CMD works
# as-is. Also drop the old /opt/env PATH/CUDA_HOME/LD_LIBRARY_PATH overrides
# below: those existed only to fix the Stage-C image's nonstandard layout;
# this image sets a correct standard env (python3 + vllm under /usr/local,
# CUDA under /usr/local/cuda) itself, so overriding it risks clobbering it.

env:
  HF_HUB_OFFLINE: 1
  HF_HUB_DISABLE_XET: 1
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
  VLLM_TRITON_MLA_SPARSE: 1
  VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: 256
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: 0
  VLLM_SKIP_INIT_MEMORY_CHECK: 1
  VLLM_USE_FLASHINFER_SAMPLER: 1
  VLLM_USE_B12X_MOE: 1
  VLLM_USE_B12X_WO_PROJECTION: 1
  DSPARK_SLOT_CLAMP: 1
  VLLM_DSPARK_LOCAL_ARGMAX: 1
  VLLM_DSPARK_REPLICATE_MARKOV_W1: 1
  VLLM_DSPARK_GPU_REJECTED_CONTEXT_MASK: 1
  VLLM_DSPARK_HARDWARE_SCHEDULER_EARLY_STOP: 1
  TORCH_CUDA_ARCH_LIST: 12.1a
  FLASHINFER_CUDA_ARCH_LIST: 12.1a
  FLASHINFER_DISABLE_VERSION_CHECK: 1
  TILELANG_CLEANUP_TEMP_FILES: 1
  DG_JIT_USE_NVRTC: 0
  DG_JIT_NVCC_COMPILER: /usr/local/cuda/bin/nvcc
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  NCCL_CROSS_NIC: 1
  NCCL_IGNORE_CPU_AFFINITY: 1
  NCCL_DEBUG: WARN
  NCCL_NVLS_ENABLE: 0
  # New in the Anemll/vLLM-0.25 compose; not auto-injected by lmswitch's
  # vllm-dual runtime (which only pins NCCL_SOCKET_IFNAME/HCA/GID_INDEX).
  NCCL_IB_ADDR_FAMILY: AF_INET
  NCCL_IB_ROCE_VERSION_NUM: 2

extra_args:
  - "--trust-remote-code"
  - "--kv-cache-dtype=nvfp4_ds_mla"
  - "--block-size=256"
  - "--max-num-batched-tokens=8192"
  - "--max-cudagraph-capture-size=24"   # max_num_seqs * (MTP + 1) = 6 * 4
  - "--enable-prefix-caching"
  - "--async-scheduling"
  - "--enable-chunked-prefill"
  - "--moe-backend=flashinfer_b12x"
  - "--speculative-config={\"method\":\"dspark\",\"num_speculative_tokens\":3,\"draft_sample_method\":\"probabilistic\"}"
  - "--tokenizer-mode=deepseek_v4"
  - "--distributed-executor-backend=mp"
  - "--tool-call-parser=deepseek_v4"
  - "--enable-auto-tool-choice"
  - "--reasoning-parser=deepseek_v4"
  - "--reasoning-config={\"reasoning_parser\":\"deepseek_v4\",\"reasoning_start_str\":\"<think>\",\"reasoning_end_str\":\"</think>\"}"
  - "--default-chat-template-kwargs={\"thinking\":false}"
  - "--generation-config=vllm"
  - "--enable-flashinfer-autotune"
