# lmswitch BENCH PROFILE of Ornith-1.0-35B Q8 — GGUF via llama.cpp.
#
# Benchmark profile for ornith/Ornith-1.0-35B-Q8_0 (Q8_0, ~34.4G).
# Served via llama.cpp. Same model as the NVFP4 version — quantization comparison.
#
# Filename id = served-model-name = "ornith-35b-q8-llamacpp".
# Place in your lmswitch ai-models/, then:
#   lmswitch on ornith-35b-q8-llamacpp

runtime: llama
model: "ornith/Ornith-1.0-35B-Q8_0/ornith-1.0-35b-Q8_0.gguf"
port: 8221
# With -kvu the ctx is one shared pool: 32 streams x 1280 tok = ~41K cells < 65536.
ctx: 65536
display_name: "Ornith-1.0-35B Q8 [BENCH]"

# -np 32: slots >= sweep ceiling (32) — don't cap concurrency below the sweep.
# -kvu: unified KV buffer; explicit -np disables it, and split mode measured
# ~30% slower per-stream (see qwen3.6-35b-q8-llamacpp results/*-np32-split.json).
extra_args: ["-fa", "on", "-ctk", "q8_0", "-ctv", "q8_0", "-np", "32", "-kvu"]
