# Harness run config for the qwopus3.6-27b-coder-q8-llamacpp recipe.
# Runs ON the Spark, against the bench-profile served by lmswitch on :8230.
#
#   lmswitch on qwopus3.6-27b-coder-q8-llamacpp       # wait for "Ready on port 8230"
#   cd ~/dev/dgx-spark-bench/harness
#   .venv/bin/python bench.py ../recipes/qwopus3.6-27b-coder-q8-llamacpp/harness.yaml \
#     -o ../results/qwopus3.6-27b-coder-q8-llamacpp.json
#   lmswitch off qwopus3.6-27b-coder-q8-llamacpp

series:
  id: qwopus3.6-27b-coder-q8-llamacpp
  model: Qwopus3.6-27B-Coder
  params_b: 27
  quant: GGUF Q8_0
  backend: llama.cpp
  status: measured
  weights_gb: 28
  recipe_url: https://github.com/jvr0x/dgx-spark-bench/tree/main/recipes/qwopus3.6-27b-coder-q8-llamacpp
  config:
    checkpoint: Jackrong/Qwopus3.6-27B-Coder-MTP-GGUF/Qwopus3.6-27B-Coder-MTP-Q8_0.gguf
    runtime: llama.cpp
    quantization: Q8_0
    flash_attention: true
    kv_cache_dtype: q8_0
    ctx: 65536
    parallel: 32
    kv_unified: true
    speculative: NONE (llama.cpp)
    note: "dense 27B Q8 data point (MTP head unused by llama.cpp)"

engine:
  base_url: http://localhost:8230
  model: qwopus3.6-27b-coder-q8-llamacpp
  api_key: dummy
  extra_body:
    ignore_eos: true
    min_tokens: 256

hardware:
  name: DGX Spark
  soc: GB10 Grace Blackwell
  mem_gb: 128
  mem_type: LPDDR5x
  bw_gbs: 273
  fp4_tops: 1000

workload:
  name: chat
  prompt_tokens: 1024
  output_tokens: 256

sweep:
  concurrencies: [1, 2, 4, 8, 16, 32]
  warmup_s: 30
  measure_s: 180
  request_timeout_s: 300
