# Harness run config for the qwen-agentworld-35b-bf16 recipe.
# Runs ON the Spark, against the bench-profile served by lmswitch on :8233.
#
#   lmswitch on qwen-agentworld-35b-bf16       # wait for "Ready on port 8233"
#   cd ~/dev/dgx-spark-bench/harness
#   .venv/bin/python bench.py ../recipes/qwen-agentworld-35b-bf16/harness.yaml \
#     -o ../results/qwen-agentworld-35b-bf16.json
#   lmswitch off qwen-agentworld-35b-bf16

series:
  id: qwen-agentworld-35b-bf16
  model: Qwen-AgentWorld-35B-A3B
  params_b: 35
  quant: BF16
  backend: vLLM 0.23
  status: measured
  weights_gb: 65
  recipe_url: https://github.com/jvr0x/dgx-spark-bench/tree/main/recipes/qwen-agentworld-35b-bf16
  config:
    checkpoint: Qwen-AgentWorld-35B-A3B
    runtime: vLLM
    quantization: BF16
    flash_attention: true
    kv_cache_dtype: fp8
    ctx: 32768
    max_num_seqs: 64
    speculative: NONE
    note: "unquantized bf16 baseline for the 35B-A3B family"

engine:
  base_url: http://localhost:8233
  model: qwen-agentworld-35b-bf16
  api_key: dummy
  extra_body:
    ignore_eos: true
    min_tokens: 256

hardware:
  name: DGX Spark
  soc: GB10 Grace Blackwell
  mem_gb: 128
  mem_type: LPDDR5x
  bw_gbs: 273
  fp4_tops: 1000

workload:
  name: chat
  prompt_tokens: 1024
  output_tokens: 256

sweep:
  concurrencies: [1, 2, 4, 8, 16, 32]
  warmup_s: 30
  measure_s: 180
  request_timeout_s: 300
