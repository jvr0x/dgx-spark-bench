# Harness run config for the nemotron3-nano-30b-q8-llamacpp recipe.
# Runs ON the Spark, against the bench-profile served by lmswitch on :8229.
#
#   lmswitch on nemotron3-nano-30b-q8-llamacpp       # wait for "Ready on port 8229"
#   cd ~/dev/dgx-spark-bench/harness
#   .venv/bin/python bench.py ../recipes/nemotron3-nano-30b-q8-llamacpp/harness.yaml \
#     -o ../results/nemotron3-nano-30b-q8-llamacpp.json
#   lmswitch off nemotron3-nano-30b-q8-llamacpp

series:
  id: nemotron3-nano-30b-q8-llamacpp
  model: Nemotron-3-Nano-30B-A3B
  params_b: 30
  quant: GGUF Q8_K_XL
  backend: llama.cpp
  status: measured
  weights_gb: 38
  recipe_url: https://github.com/jvr0x/dgx-spark-bench/tree/main/recipes/nemotron3-nano-30b-q8-llamacpp
  config:
    checkpoint: nemotron3-gguf/Nemotron-3-Nano-30B-A3B-UD-Q8_K_XL.gguf
    runtime: llama.cpp
    quantization: Q8_K_XL
    flash_attention: true
    kv_cache_dtype: q8_0
    ctx: 65536
    parallel: 32
    kv_unified: true
    speculative: NONE (llama.cpp)
    note: "cross-backend pair with the FP8 vLLM run of the same model"

engine:
  base_url: http://localhost:8229
  model: nemotron3-nano-30b-q8-llamacpp
  api_key: dummy
  extra_body:
    ignore_eos: true
    min_tokens: 256

hardware:
  name: DGX Spark
  soc: GB10 Grace Blackwell
  mem_gb: 128
  mem_type: LPDDR5x
  bw_gbs: 273
  fp4_tops: 1000

workload:
  name: chat
  prompt_tokens: 1024
  output_tokens: 256

sweep:
  concurrencies: [1, 2, 4, 8, 16, 32]
  warmup_s: 30
  measure_s: 180
  request_timeout_s: 300
