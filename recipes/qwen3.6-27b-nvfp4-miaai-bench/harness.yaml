# Harness run config for the qwen3.6-27b-nvfp4-miaai-bench recipe.
# Runs ON the Spark, against the bench-profile served by lmswitch on :8239.
#
#   lmswitch on qwen3.6-27b-nvfp4-miaai-bench       # wait for "Ready on port 8239"
#   cd ~/dev/dgx-spark-bench/harness
#   .venv/bin/python bench.py ../recipes/qwen3.6-27b-nvfp4-miaai-bench/harness.yaml \
#     -o ../results/qwen3.6-27b-nvfp4-miaai-bench.json
#   lmswitch off qwen3.6-27b-nvfp4-miaai-bench

series:
  id: qwen3.6-27b-nvfp4-miaai-bench
  model: Qwen3.6-27B
  params_b: 27
  quant: NVFP4
  backend: vLLM 0.23
  status: measured
  weights_gb: 21
  recipe_url: https://github.com/jvr0x/dgx-spark-bench/tree/main/recipes/qwen3.6-27b-nvfp4-miaai-bench
  config:
    checkpoint: nvidia/Qwen3.6-27B-NVFP4
    runtime: vLLM
    quantization: NVFP4
    flash_attention: true
    kv_cache_dtype: auto
    ctx: 32768
    max_num_seqs: 64
    speculative: MTP, 3 tokens, triton MoE
    note: "A/B vs aeon7: MiaAI-Lab repo config on stock nightly image, MTP n=3"

engine:
  base_url: http://localhost:8239
  model: qwen3.6-27b-nvfp4-miaai-bench
  api_key: dummy
  extra_body:
    ignore_eos: true
    min_tokens: 256

hardware:
  name: DGX Spark
  soc: GB10 Grace Blackwell
  mem_gb: 128
  mem_type: LPDDR5x
  bw_gbs: 273
  fp4_tops: 1000

workload:
  name: chat
  prompt_tokens: 1024
  output_tokens: 256

sweep:
  concurrencies: [1, 2, 4, 8, 16, 32]
  warmup_s: 30
  measure_s: 180
  request_timeout_s: 300
