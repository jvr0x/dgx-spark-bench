# Harness run config for the deepseek-v4-flash-spark-q3-llamacpp recipe.
# Runs ON the Spark, against the bench-profile served by lmswitch on :8227.
#
#   lmswitch on deepseek-v4-flash-spark-q3-llamacpp       # wait for "Ready on port 8227"
#   cd ~/dev/dgx-spark-bench/harness
#   .venv/bin/python bench.py ../recipes/deepseek-v4-flash-spark-q3-llamacpp/harness.yaml \
#     -o ../results/deepseek-v4-flash-spark-q3-llamacpp.json
#   lmswitch off deepseek-v4-flash-spark-q3-llamacpp

series:
  id: deepseek-v4-flash-spark-q3-llamacpp
  model: DeepSeek-V4-Flash-Spark
  params_b: 162
  quant: GGUF Q3 REAP
  backend: llama.cpp
  status: measured
  weights_gb: 77
  recipe_url: https://github.com/jvr0x/dgx-spark-bench/tree/main/recipes/deepseek-v4-flash-spark-q3-llamacpp
  config:
    checkpoint: 0xSero/DeepSeek-V4-Flash-Spark-GGUF/DeepSeek-V4-Flash-Spark-Q3-Dynamic-REAP-ds4.gguf
    runtime: llama.cpp
    quantization: Q3 REAP
    flash_attention: true
    kv_cache_dtype: q8_0
    ctx: 32768
    parallel: 4
    kv_unified: false
    speculative: NONE (llama.cpp)
    note: "162B-class MoE at Q3, 77G weights — reduced slots/ctx to fit"

engine:
  base_url: http://localhost:8227
  model: deepseek-v4-flash-spark-q3-llamacpp
  api_key: dummy
  extra_body:
    ignore_eos: true
    min_tokens: 256

hardware:
  name: DGX Spark
  soc: GB10 Grace Blackwell
  mem_gb: 128
  mem_type: LPDDR5x
  bw_gbs: 273
  fp4_tops: 1000

workload:
  name: chat
  prompt_tokens: 1024
  output_tokens: 256

sweep:
  concurrencies: [1, 2, 4]  # fork crashes above 4 slots — see profile
  warmup_s: 30
  measure_s: 180
  request_timeout_s: 300
