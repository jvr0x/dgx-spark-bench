# Harness run config for the qwen3.6-35b-nvfp4 flagship recipe.
# Runs ON the Spark, against the bench-profile served by lmswitch on :8214.
#   lmswitch on qwen3.6-35b-nvfp4-bench         # wait for "Ready on port 8214"
#   cd ~/dev/dgx-spark-bench/harness
#   .venv/bin/python bench.py ../recipes/qwen3.6-35b-nvfp4-nvidia/harness.yaml \
#     -o ../results/qwen3.6-35b-nvfp4-nvidia.json
#   lmswitch off qwen3.6-35b-nvfp4-bench

series:
  id: qwen3.6-35b-nvfp4-nvidia            # dashboard id (the real model, not the bench-profile id)
  model: Qwen3.6-35B-A3B
  params_b: 35                            # total; ~3B active (MoE)
  quant: NVFP4-mixed +MTP                 # label the as-served stack: mixed-precision NVFP4 + MTP spec-decode
  backend: vLLM 0.23 (AEON)
  status: measured
  weights_gb: 21.9                        # measured: "Model loading took 21.93 GiB" (vLLM log)
  recipe_url: https://github.com/jvr0x/dgx-spark-bench/tree/main/recipes/qwen3.6-35b-nvfp4-nvidia
  config:                                 # the load-bearing engine knobs (curated; full set in the recipe yaml)
    checkpoint: nvidia/qwen3.6-35b-a3b-nvfp4
    image: ghcr.io/aeon-7/aeon-vllm-ultimate:latest
    quantization: modelopt_mixed (auto)
    attention_backend: flashinfer
    kv_cache_dtype: fp8
    kv_cache_memory: 32 GiB (explicit)
    speculative: MTP, 3 tokens, triton MoE
    max_num_seqs: 64
    max_model_len: 32768
    max_num_batched_tokens: 8192
    cuda_graphs: true
    chunked_prefill: true
    async_scheduling: true
    prefix_caching: "on (defeated by unique prompts)"
    load_format: fastsafetensors

engine:
  base_url: http://localhost:8214         # harness runs on the Spark -> localhost
  model: qwen3.6-35b-nvfp4-bench          # MUST equal the bench yaml's served-model-name (its filename id)
  api_key: dummy
  extra_body:
    # vLLM honours these to force exactly output_tokens; the harness also counts the
    # actual completion_tokens from usage, so it's correct even if a backend ignores them.
    ignore_eos: true
    min_tokens: 256

hardware:
  name: DGX Spark
  soc: GB10 Grace Blackwell
  mem_gb: 128
  mem_type: LPDDR5x
  bw_gbs: 273
  fp4_tops: 1000

workload:
  name: chat
  prompt_tokens: 1024
  output_tokens: 256

sweep:
  concurrencies: [1, 2, 4, 8, 16, 32, 64]
  warmup_s: 10
  measure_s: 60
  request_timeout_s: 300
