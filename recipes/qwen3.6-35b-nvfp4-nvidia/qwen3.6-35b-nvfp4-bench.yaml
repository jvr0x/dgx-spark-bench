# lmswitch BENCH PROFILE of qwen3.6-35b-nvfp4-nvidia.
# IDENTICAL serving stack (AEON image, MTP spec-decode, FP8 KV, parsers) — only the knobs
# that would otherwise corrupt a throughput sweep are changed vs the daily-driver config:
#
#   max_num_seqs:            4   -> 64     don't cap concurrency below the sweep ceiling
#   gpu_memory_utilization:  0.4 -> 0.9    solo & dedicated -> maximise KV cache = real concurrency room
#   ctx:                  262144 -> 32768  256K pre-reserves huge KV/seq and would throttle batching;
#                                          the 1024/256 workload only needs ~1.3K tokens/seq
#
# Filename id = served-model-name = "qwen3.6-35b-nvfp4-bench" (what the harness targets).
# Place in your lmswitch ai-models/ (or a dedicated LMSWITCH_DATA_DIR), then:
#   lmswitch on qwen3.6-35b-nvfp4-bench
#
# UNVALIDATED COMBO: the daily driver runs seqs:4 deliberately. MTP spec-decode + seqs:64 on this
# mixed-precision checkpoint may OOM at load or degrade past ~16 concurrent (spec gains shrink as
# the batch grows). If so, dial max_num_seqs down or drop --speculative-config — that finding is
# itself a benchmark result worth recording.

runtime: vllm
model: "nvidia/qwen3.6-35b-a3b-nvfp4"
port: 8214
ctx: 32768
display_name: "Qwen3.6-35B-A3B NVFP4 [BENCH]"

image: "ghcr.io/aeon-7/aeon-vllm-ultimate:latest"
entrypoint: "vllm serve"
env:
  TORCH_CUDA_ARCH_LIST: "12.1a"
  CUTE_DSL_ARCH: "sm_121a"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

gpu_memory_utilization: 0.9        # bench knob — solo
max_num_seqs: 64                   # bench knob — >= sweep ceiling
tool_call_parser: "qwen3_xml"
reasoning_parser: "qwen3"
attention_backend: "flashinfer"
load_format: "fastsafetensors"
trust_remote_code: true
enforce_eager: false               # as-served: CUDA graphs on

extra_args:
  - "--kv-cache-dtype"
  - "fp8"
  - "--max-num-batched-tokens"
  - "8192"
  - "--enable-chunked-prefill"
  - "--async-scheduling"
  - "--enable-prefix-caching"      # harmless here — the harness sends unique prompts so it never hits
  - "--speculative-config"
  - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
