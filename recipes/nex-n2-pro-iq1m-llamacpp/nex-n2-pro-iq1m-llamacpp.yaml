# lmswitch BENCH PROFILE of Nex-N2-Pro-397B-A17B — GGUF via llama.cpp.
# 397B-A17B at IQ1_M, 91G — tightest fit on the box (~9G headroom). FLAGGED: OOM risk, run supervised
# Filename id = served-model-name = "nex-n2-pro-iq1m-llamacpp".

runtime: llama
model: "Nex-N2-Pro-IQ1_M/IQ1_M/Nex-397B-A17B-IQ1_M-00001-of-00005.gguf"
port: 8228
# With -kvu the ctx is one shared pool: 8 streams x 1280 tok = ~10K cells < 32768.
ctx: 32768
display_name: "Nex-N2-Pro-397B-A17B [BENCH]"
# Reason: RAM guard wants weights*1.3 (~118Gi) > ~107Gi free, but real footprint at
# 32k ctx q8 KV is ~95-98Gi. Tighter than step-3.7-flash — run supervised, not unattended.
force: true

# -np 8: slots >= sweep ceiling (8) — don't cap concurrency below the sweep.
# -kvu: unified KV buffer; explicit -np disables it, and split mode measured
# ~30% slower per-stream (see qwen3.6-35b-q8-llamacpp results/*-np32-split.json).
extra_args: ["-fa", "on", "-ctk", "q8_0", "-ctv", "q8_0", "-np", "8", "-kvu"]
